<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Galerie keramických výrobků z dílny Meckatá Cacička.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">Meckatá Cacička</a>
      <button class="hamburger" aria-label="Menu">
        <span class="hamburger__line"></span>
        <span class="hamburger__line"></span>
        <span class="hamburger__line"></span>
      </button>
      <div class="navbar__menu">
        <div class="navbar__links">
          <a href="index.html" data-lang-cs="Domů" data-lang-en="Home">Domů</a>
          <a href="galerie.html" class="active" data-lang-cs="Galerie" data-lang-en="Gallery">Galerie</a>
          <a href="workshopy.html" data-lang-cs="Workshopy" data-lang-en="Workshops">Workshopy</a>
          <a href="o-nas.html" data-lang-cs="O nás" data-lang-en="About">O nás</a>
          <a href="kontakt.html" data-lang-cs="Kontakt" data-lang-en="Contact">Kontakt</a>
        </div>
        <div class="lang-toggle">
          <button class="lang-toggle__btn active" data-lang="cs">CZ</button>
          <button class="lang-toggle__btn" data-lang="en">EN</button>
        </div>
      </div>
      <div class="mobile-overlay"></div>
    </div>
  </nav>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1 data-lang-cs="Galerie" data-lang-en="Gallery">Galerie</h1>
      <p data-lang-cs="Nahlédněte do naší dílny a prohlédněte si výtvory našich účastníků" data-lang-en="Take a peek into our workshop and browse creations by our participants">Nahlédněte do naší dílny a prohlédněte si výtvory našich účastníků</p>
    </div>
  </section>

  <!-- Gallery -->
  <section class="gallery section">
    <div class="container">
      <div class="gallery__grid">
        <div class="gallery__item fade-in">
          <img src="assets/Hand-thrown%20bowl.jpg" alt="Ručně točená miska" class="gallery__image" loading="lazy">
        </div>
        <div class="gallery__item fade-in">
          <img src="assets/Ceramic%20mug.jpg" alt="Keramický hrnek" class="gallery__image" loading="lazy">
        </div>
        <div class="gallery__item fade-in">
          <img src="assets/Glazed%20planter.jpg" alt="Květináč s glazurou" class="gallery__image" loading="lazy">
        </div>
        <div class="gallery__item fade-in">
          <img src="assets/decorated%20plate.jpg" alt="Talíř s dekorem" class="gallery__image" loading="lazy">
        </div>
        <div class="gallery__item fade-in">
          <img src="assets/Workshop%20vase.jpg" alt="Váza z workshopu" class="gallery__image" loading="lazy">
        </div>
        <div class="gallery__item fade-in">
          <img src="assets/Decorative%20heart.jpg" alt="Dekorativní srdíčko" class="gallery__image" loading="lazy">
        </div>
        <div class="gallery__item fade-in">
          <img src="assets/Bowl%20set.jpg" alt="Sada misek" class="gallery__image" loading="lazy">
        </div>
        <div class="gallery__item fade-in">
          <img src="assets/Garden%20ceramics.jpg" alt="Zahradní keramika" class="gallery__image" loading="lazy">
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <div class="footer__logo">Meckatá Cacička</div>
        <div class="footer__links">
          <a href="index.html" data-lang-cs="Domů" data-lang-en="Home">Domů</a>
          <a href="galerie.html" data-lang-cs="Galerie" data-lang-en="Gallery">Galerie</a>
          <a href="workshopy.html" data-lang-cs="Workshopy" data-lang-en="Workshops">Workshopy</a>
          <a href="o-nas.html" data-lang-cs="O nás" data-lang-en="About">O nás</a>
          <a href="kontakt.html" data-lang-cs="Kontakt" data-lang-en="Contact">Kontakt</a>
        </div>
        <div class="footer__social">
          <a href="https://www.facebook.com/share/1GLigWv4C5/" target="_blank" rel="noopener noreferrer">Facebook</a>
        </div>
      </div>
      <div class="footer__bottom">
        <p>&copy; 2026 Meckatá Cacička. <span data-lang-cs="Všechna práva vyhrazena." data-lang-en="All rights reserved.">Všechna práva vyhrazena.</span></p>
      </div>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
    <button type="button" class="lightbox__btn lightbox__close" aria-label="Zavřít" data-lang-aria-cs="Zavřít" data-lang-aria-en="Close">&times;</button>
    <button type="button" class="lightbox__btn lightbox__prev" aria-label="Předchozí" data-lang-aria-cs="Předchozí" data-lang-aria-en="Previous">&#10094;</button>
    <img class="lightbox__image" src="" alt="">
    <button type="button" class="lightbox__btn lightbox__next" aria-label="Další" data-lang-aria-cs="Další" data-lang-aria-en="Next">&#10095;</button>
  </div>

  <script src="main.js"></script>

</html>
